<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning pharmacie</title>
<link rel="icon" type="image/png" href="assets/favicon.png?v=4">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=4">
<link rel="stylesheet" href="css/planning.css?v=20260720">
</head>
<body>
<div class="app">

  <header class="topbar">
    <h1 id="app-title">Planning</h1>
    <div class="topbtns">
      <div class="topbtns-primary">
        <button id="btn-cloud-login" type="button" class="topbtn-cloud hidden" title="Connexion Supabase">☁ Connexion cloud</button>
        <button id="btn-cloud-sync" type="button" class="topbtn-cloud topbtn-sync hidden" title="Enregistrer le planning sur Supabase">☁ Synchroniser</button>
        <button id="btn-feedback" type="button" class="topbtn-cloud topbtn-feedback hidden" title="Proposer une amélioration">💡</button>
      </div>
      <div class="topbtns-tools">
        <button id="btn-export-json" class="topbtn-compact" title="Enregistrer planning_AAAA-MM-JJ_HH-MM.json dans sauvegardes/">⬇ JSON</button>
        <button id="btn-import-json" class="topbtn-compact" title="Importer la sauvegarde la plus récente depuis sauvegardes/">⬆ JSON</button>
        <input type="file" id="file-import" accept="application/json,.json" class="hidden">
        <input type="file" id="folder-import" webkitdirectory multiple class="hidden">
        <button id="btn-reset" class="topbtn-compact topbtn-danger" title="Réinitialiser toutes les données">↺</button>
      </div>
    </div>
  </header>

  <div class="nav-shell">
    <nav class="nav-groups" id="nav-groups">
      <button type="button" data-group="planning" class="active">Planning</button>
      <button type="button" data-group="equipe">Équipe</button>
      <button type="button" data-group="journees">Journées spéciales</button>
      <button type="button" data-group="analyse">Analyse</button>
      <button type="button" data-group="config">Configuration</button>
    </nav>
    <nav class="nav-subtabs" id="tabs">
      <button type="button" data-tab="week" data-group="planning" class="active">📅 Semaine</button>
      <button type="button" data-tab="patterns" data-group="planning">🧩 Patterns</button>
      <button type="button" data-tab="planning-requests" data-group="planning">📋 Demandes</button>
      <button type="button" data-tab="emp-overview" data-group="analyse">📊 Vue d'ensemble</button>
      <button type="button" data-tab="emp-detail" data-group="analyse">👤 Salarié</button>
      <button type="button" data-tab="conges" data-group="equipe">🌴 Congés</button>
      <button type="button" data-tab="employees" data-group="equipe">👥 Équipe</button>
      <button type="button" data-tab="contract" data-group="equipe">📄 Contrat</button>
      <button type="button" data-tab="cdi" data-group="equipe">📋 CDI</button>
      <button type="button" data-tab="releve" data-group="equipe">🧾 Relevé d'heures</button>
      <button type="button" data-tab="feries" data-group="journees">🎉 Jours fériés</button>
      <button type="button" data-tab="gardes" data-group="journees">🏥 Jours de garde</button>
      <button type="button" data-tab="pantecotes" data-group="journees">🤝 Journées de solidarité</button>
      <button type="button" data-tab="help" data-group="config">❓ Aide</button>
      <button type="button" data-tab="rgpd" data-group="config">🔒 RGPD</button>
      <button type="button" data-tab="settings" data-group="config">⚙ Paramètres</button>
    </nav>
  </div>

  <div class="main">
    <main class="content" id="content"></main>
    <aside class="side" id="sidebar"></aside>
  </div>

</div>

<!-- Supabase + auth cloud -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/00-config.js?v=20260717"></script>
<script src="js/00-auth.js?v=20260719"></script>
<script src="js/00-sync.js?v=20260719"></script>
<!-- Ordre de chargement important (dépendances globales) -->
<script src="js/02-dates.js?v=20260626"></script>
<script src="js/03-conges.js?v=20260709"></script>
<script src="js/04-engine.js?v=20260702"></script>
<script src="js/03-feries.js?v=20260626"></script>
<script src="js/03-gardes.js?v=20260626"></script>
<script src="js/03-pantecotes.js?v=20260703"></script>
<script src="js/03-employees.js?v=20260626"></script>
<script src="js/03-cdi.js?v=20260626"></script>
<script src="js/01-state.js?v=20260719"></script>
<script src="js/05-views.js?v=20260720"></script>
<script src="js/06-editors.js?v=20260719"></script>
<script src="js/08-contract.js?v=20260707"></script>
<script src="js/09-cdi.js?v=20260627"></script>
<script src="js/10-planning-requests.js?v=20260629"></script>
<script src="js/11-help.js?v=20260719"></script>
<script src="js/12-rgpd.js?v=20260713"></script>
<script src="js/13-feedback.js?v=20260717"></script>
<script src="js/07-app.js?v=20260719"></script>
</body>
</html>
