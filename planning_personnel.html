<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Personnel — Gestion par patterns versionnés</title>
<link rel="stylesheet" href="css/planning.css?v=20260542">
</head>
<body>
<div class="app">

  <header class="topbar">
    <h1>Planning Personnel <span class="sub">— gestion par patterns versionnés</span></h1>
    <div class="topbtns">
      <button id="btn-export-json" title="Enregistrer planning_AAAA-MM-JJ_HH-MM.json dans sauvegardes/">⬇ Exporter JSON</button>
      <button id="btn-import-json" title="Importer la sauvegarde la plus récente depuis sauvegardes/">⬆ Importer JSON</button>
      <input type="file" id="file-import" accept="application/json,.json" class="hidden">
      <input type="file" id="folder-import" webkitdirectory multiple class="hidden">
      <button id="btn-print" title="Imprimer la vue courante">🖨 Imprimer</button>
      <button id="btn-export-png" title="Exporter la vue en image PNG">🖼 Exporter PNG</button>
      <button id="btn-reset" title="Réinitialiser toutes les données">↺ Réinitialiser</button>
    </div>
  </header>

  <div class="nav-shell">
    <nav class="nav-groups" id="nav-groups">
      <button type="button" data-group="planning" class="active">Planning</button>
      <button type="button" data-group="equipe">Équipe</button>
      <button type="button" data-group="journees">Journées spéciales</button>
      <button type="button" data-group="analyse">Analyse</button>
    </nav>
    <nav class="nav-subtabs" id="tabs">
      <button type="button" data-tab="week" data-group="planning" class="active">📅 Semaine</button>
      <button type="button" data-tab="patterns" data-group="planning">🧩 Patterns</button>
      <button type="button" data-tab="emp-overview" data-group="analyse">📊 Vue d'ensemble</button>
      <button type="button" data-tab="emp-detail" data-group="analyse">👤 Salarié</button>
      <button type="button" data-tab="conges" data-group="equipe">🌴 Congés</button>
      <button type="button" data-tab="employees" data-group="equipe">👥 Équipe</button>
      <button type="button" data-tab="contract" data-group="equipe">📄 Contrat</button>
      <button type="button" data-tab="feries" data-group="journees">🎉 Jours fériés</button>
      <button type="button" data-tab="gardes" data-group="journees">🏥 Jours de garde</button>
    </nav>
  </div>

  <div class="main">
    <main class="content" id="content"></main>
    <aside class="side" id="sidebar"></aside>
  </div>

</div>

<!-- Ordre de chargement important (dépendances globales) -->
<script src="js/02-dates.js?v=20260542"></script>
<script src="js/04-engine.js?v=20260542"></script>
<script src="js/03-feries.js?v=20260542"></script>
<script src="js/03-gardes.js?v=20260542"></script>
<script src="js/03-employees.js?v=20260542"></script>
<script src="js/01-state.js?v=20260542"></script>
<script src="js/05-views.js?v=20260542"></script>
<script src="js/06-editors.js?v=20260542"></script>
<script src="js/08-contract.js?v=20260542"></script>
<script src="js/07-app.js?v=20260542"></script>
</body>
</html>
